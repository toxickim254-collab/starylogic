<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="player-score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="game-info">
                <button id="startBtn" class="btn">START GAME</button>
                <p id="gameStatus">Press START GAME to begin</p>
            </div>
            <div class="computer-score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="paddle player-paddle" id="playerPaddle"></div>
            <div class="ball" id="ball"></div>
            <div class="paddle computer-paddle" id="computerPaddle"></div>
            <div class="center-line"></div>
        </div>

        <div class="instructions">
            <h3>Instructions:</h3>
            <p><strong>Player (Left Paddle):</strong> Use MOUSE or ARROW KEYS (UP/DOWN)</p>
            <p><strong>Computer (Right Paddle):</strong> Controlled by AI</p>
            <p>First to reach 11 points wins!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
